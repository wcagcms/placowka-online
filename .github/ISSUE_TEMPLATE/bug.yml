name: Błąd
description: Zgłoś odtwarzalny błąd, który nie jest podatnością bezpieczeństwa.
title: "[Błąd] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Podatności zgłaszaj prywatnie zgodnie z SECURITY.md."
  - type: input
    id: version
    attributes:
      label: Wersja
      placeholder: "panel / agent / instalator"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Opis i kroki odtworzenia
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Oczekiwany rezultat
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Bezpieczeństwo danych
      options:
        - label: "Usunąłem tokeny, hasła i dane placówki."
          required: true
