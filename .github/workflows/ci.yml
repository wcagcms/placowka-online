name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.4'
          coverage: none
        env:
          fail-fast: true
      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer audit --locked
      - run: pwsh -File scripts/refresh-source-manifest.ps1
      - run: git diff --exit-code SOURCE_MANIFEST.sha256
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: touch database/database.sqlite
      - run: php artisan migrate --force
      - run: php scripts/php-syntax-check.php
      - run: php artisan test
      - run: bash scripts/public-repo-audit.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
      - name: Require npm lockfile
        run: test -f package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache: false
      - run: gofmt -w storage/app/agent-template/src/main.go storage/app/agent-installer/src/enroll/main.go
      - run: git diff --exit-code
      - run: bash scripts/build-agent-secure.sh "$GITHUB_WORKSPACE"
