name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: touch database/database.sqlite
      - run: php artisan migrate --force
      - run: php scripts/php-syntax-check.php
      - run: php artisan test
      - run: bash scripts/public-repo-audit.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - run: gofmt -w storage/app/agent-template/src/main.go storage/app/agent-installer/src/enroll/main.go
      - run: git diff --exit-code
      - run: bash scripts/build-agent-secure.sh "$GITHUB_WORKSPACE"
